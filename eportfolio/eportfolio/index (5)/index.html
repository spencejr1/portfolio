<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Mitt Matematikspel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="box">
        <h1>Matteutmaning</h1>

        <p id="question">Tryck på "Ny fråga" för att börja.</p>

        <input type="number" id="answer" placeholder="Ditt svar">

        <div>
            <button id="newQuestion">Ny fråga</button>
            <button id="checkAnswer">Kolla svar</button>
            <button id="restart">Starta om</button>
        </div>

        <p id="result"></p>
        <p>Poäng: <span id="points">0</span></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
